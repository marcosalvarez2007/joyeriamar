<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Dashboard - Registro de Usuarios</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       1. VARIABLES Y CONFIGURACIÓN BASE
       ========================================================================== */
    :root {
      --bg-app: #09090b;
      --bg-card: #141416;
      --border-color: #27272a;
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-light: rgba(59, 130, 246, 0.1);
      --success: #10b981;
      --radius: 12px;
      --font-sans: 'Inter', sans-serif;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-app);
      color: var(--text-main);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      /* Ocultamos el cursor por defecto en pantallas grandes para usar el personalizado */
      cursor: none; 
      overflow-x: hidden;
    }

    /* Evita que los botones e inputs muestren el puntero de Windows */
    input, button, select, textarea, a, th, td {
      cursor: none !important;
    }

    /* ==========================================================================
       ESTILOS DEL CURSOR CUSTOM
       ========================================================================== */
    .custom-cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background-color: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
    }

    .custom-cursor-ring {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(59, 130, 246, 0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1), width 0.3s, height 0.3s, background-color 0.3s;
    }

    /* Efecto hover global para elementos interactivos */
    body.cursor-hover .custom-cursor-ring {
      width: 44px;
      height: 44px;
      background-color: rgba(59, 130, 246, 0.08);
      border-color: var(--accent);
    }

    /* Ocultar cursores en dispositivos táctiles donde no hay mouse */
    @media (max-width: 1024px) {
      body { cursor: auto; }
      input, button, select, textarea, a { cursor: auto !important; }
      .custom-cursor, .custom-cursor-ring { display: none !important; }
    }

    /* ==========================================================================
       2. ESTRUCTURA Y DISEÑO (LAYOUT)
       ========================================================================== */
    .app-container {
      width: 100%;
      max-width: 1200px;
      padding: 2.5rem 1.5rem;
    }

    .app-header {
      margin-bottom: 2.5rem;
    }

    .app-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .app-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .app-content {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    @media (min-width: 768px) {
      .app-content {
        grid-template-columns: 380px 1fr;
        align-items: start;
      }
    }

    /* ==========================================================================
       3. COMPONENTES: CARDS (CONTENEDORES)
       ========================================================================== */
    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 0.25rem;
    }

    .card-subtitle {
      color: var(--text-muted);
      font-size: 0.87rem;
      margin-bottom: 1.5rem;
    }

    /* ==========================================================================
       4. COMPONENTES: FORMULARIO
       ========================================================================== */
    form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-main);
    }

    .input-group input {
      background-color: #09090b;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      padding: 0.75rem 1rem;
      font-family: inherit;
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .input-group input::placeholder {
      color: #52525b;
    }

    button[type="submit"] {
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: var(--transition);
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover {
      background-color: var(--accent-hover);
    }

    button[type="submit"]:disabled {
      background-color: var(--border-color);
      color: var(--text-muted);
    }

    .icon {
      width: 18px;
      height: 18px;
    }

    /* ==========================================================================
       5. COMPONENTES: TABLA Y BADGES
       ========================================================================== */
    .table-card {
      padding: 0;
      overflow: hidden;
    }

    .table-header {
      padding: 1.5rem 1.75rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .badge {
      background-color: #1e1b4b;
      color: #6366f1;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .table-responsive {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.9rem;
    }

    th {
      background-color: rgba(255, 255, 255, 0.02);
      color: var(--text-muted);
      font-weight: 500;
      padding: 1rem 1.75rem;
      border-bottom: 1px solid var(--border-color);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    td {
      padding: 1rem 1.75rem;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-main);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background-color: rgba(255, 255, 255, 0.01);
    }

    td:first-child, th:first-child {
      color: var(--text-muted);
      font-family: monospace;
    }

    /* ==========================================================================
       6. ESTADOS DE CARGA (LOADING)
       ========================================================================== */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .hidden {
      display: none !important;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2.5px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="custom-cursor"></div>
  <div class="custom-cursor-ring"></div>

  <div class="app-container">
    <header class="app-header">
      <h1>Panel de Control</h1>
      <p>Gestiona los usuarios de la plataforma en tiempo real</p>
    </header>

    <main class="app-content">
      <section class="card-section">
        <div class="card">
          <h2>Nuevo Usuario</h2>
          <p class="card-subtitle">Introduce las credenciales para dar de alta en el sistema.</p>
          
          <form id="registroForm">
            <div class="input-group">
              <label for="nombre">Nombre completo</label>
              <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required />
            </div>
            
            <div class="input-group">
              <label for="email">Correo electrónico</label>
              <input type="email" id="email" placeholder="ejemplo@dominio.com" required />
            </div>
            
            <button type="submit" id="btnSubmit">
              <span>Agregar Usuario</span>
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="22" y1="11" x2="16" y2="11"></line></svg>
            </button>
          </form>
        </div>
      </section>

      <section class="table-section">
        <div class="card table-card">
          <div class="table-header">
            <h2>Usuarios Registrados</h2>
            <span class="badge" id="userCount">0 usuarios</span>
          </div>
          
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nombre</th>
                  <th>Email</th>
                </tr>
              </thead>
              <tbody id="usuariosTabla">
                </tbody>
            </table>
          </div>
          
          <div id="loadingState" class="loading-state hidden">
            <div class="spinner"></div>
            <p>Sincronizando con Supabase...</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ==========================================================================
    // CONFIGURACIÓN DE SUPABASE
    // ==========================================================================
    const SUPABASE_URL = 'https://amlbipkwzmpckpmzkpfz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtbGJpcGt3em1wY2twbXprcGZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMzQ4OTYsImV4cCI6MjA5NDcxMDg5Nn0._3CTbgW6XiISckWMPzyPXJFczwXGO8KtABhKx_RH5b0';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ELEMENTOS DEL DOM
    const registroForm = document.getElementById('registroForm');
    const usuariosTabla = document.getElementById('usuariosTabla');
    const userCountBadge = document.getElementById('userCount');
    const loadingState = document.getElementById('loadingState');
    const btnSubmit = document.getElementById('btnSubmit');

    const cursorDot = document.querySelector('.custom-cursor');
    const cursorRing = document.querySelector('.custom-cursor-ring');

    // ==========================================================================
    // LÓGICA PRINCIPAL: OBTENER Y PINTAR USUARIOS
    // ==========================================================================
    async function obtenerUsuarios() {
      mostrarLoading(true);
      
      try {
        const { data: usuarios, error } = await supabaseClient
          .from('usuarios')
          .select('*')
          .order('id', { ascending: false });

        if (error) throw error;

        usuariosTabla.innerHTML = '';
        userCountBadge.textContent = `${usuarios.length} usuario${usuarios.length === 1 ? '' : 's'}`;

        if (usuarios.length === 0) {
          usuariosTabla.innerHTML = `
            <tr>
              <td colspan="3" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                No hay usuarios registrados todavía.
              </td>
            </tr>
          `;
          return;
        }

        usuarios.forEach(usuario => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>#${usuario.id}</td>
            <td style="font-weight: 500;">${escapeHTML(usuario.nombre)}</td>
            <td style="color: var(--text-muted);">${escapeHTML(usuario.email)}</td>
          `;
          usuariosTabla.appendChild(row);
        });

      } catch (error) {
        console.error('Error al obtener usuarios:', error.message);
      } finally {
        mostrarLoading(false);
      }
    }

    // ==========================================================================
    // EVENTO: GUARDAR NUEVO USUARIO
    // ==========================================================================
    registroForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      btnSubmit.disabled = true;
      const originalBtnContent = btnSubmit.innerHTML;
      btnSubmit.innerHTML = '<span>Guardando...</span> <div class="spinner" style="width:14px; height:14px; border-width:2px;"></div>';

      const nombre = document.getElementById('nombre').value.trim();
      const email = document.getElementById('email').value.trim();

      try {
        const { data, error } = await supabaseClient
          .from('usuarios')
          .insert([{ nombre, email }]);

        if (error) throw error;
        registroForm.reset();

      } catch (error) {
        console.error('Error al insertar usuario:', error.message);
        alert('No se pudo guardar el usuario.');
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = originalBtnContent;
        // Quita la clase hover por si quedó trabada al cambiar el estado del DOM
        document.body.classList.remove('cursor-hover');
      }
    });

    // ==========================================================================
    // TIEMPO REAL
    // ==========================================================================
    function activarTiempoReal() {
      supabaseClient
        .channel('cambios-usuarios')
        .on(
          'postgres_changes', 
          { event: '*', schema: 'public', table: 'usuarios' }, 
          (payload) => {
            obtenerUsuarios(); 
          }
        )
        .subscribe();
    }

    // ==========================================================================
    // CONTROL DEL CURSOR CUSTOM
    // ==========================================================================
    function inicializarCursorCustom() {
      if (!cursorDot || !cursorRing) return;

      window.addEventListener('mousemove', (e) => {
        // Movimiento inmediato para el punto central
        cursorDot.style.left = `${e.clientX}px`;
        cursorDot.style.top = `${e.clientY}px`;
        
        // El anillo lo sigue con el delay que le da la transición CSS
        cursorRing.style.left = `${e.clientX}px`;
        cursorRing.style.top = `${e.clientY}px`;
      });

      // Detectar hovers en elementos interactivos de forma dinámica
      document.addEventListener('mouseover', (e) => {
        if (e.target.closest('button, input, a, select, tr, th')) {
          document.body.classList.add('cursor-hover');
        }
      });

      document.addEventListener('mouseout', (e) => {
        if (e.target.closest('button, input, a, select, tr, th')) {
          document.body.classList.remove('cursor-hover');
        }
      });
    }

    // ==========================================================================
    // FUNCIONES AUXILIARES
    // ==========================================================================
    function mostrarLoading(isLoading) {
      if (isLoading) {
        loadingState.classList.remove('hidden');
      } else {
        loadingState.classList.add('hidden');
      }
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    // Inicialización global
    document.addEventListener('DOMContentLoaded', () => {
      obtenerUsuarios();   
      activarTiempoReal(); 
      inicializarCursorCustom();
    });
  </script>
</body>
</html>
